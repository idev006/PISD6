<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISD6 Movement App</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        body, html { height: 100%; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        .bg-gradient-orange { background: linear-gradient(135deg, #ff8c42 0%, #ff6b35 100%); }
        .btn-orange { background-color: #ff8c42; transition: all 0.3s ease; }
        .btn-orange:hover { background-color: #ff6b35; transform: translateY(-2px); }
        .card-shadow { box-shadow: 0 4px 15px rgba(255, 139, 66, 0.15); }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #ddd; object-fit: cover; margin-bottom: 1rem; }
        .tab-btn.active { color: #ff8c42; border-bottom: 2px solid #ff8c42; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="app-wrapper w-full h-full overflow-auto">
        
        <div id="loginScreen" class="min-h-full bg-gradient-orange flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl card-shadow p-8 w-full max-w-md text-center">
                <h2 class="text-2xl font-bold text-orange-600 mb-2">PISD6 Portal</h2>
                <p id="loadingText" class="text-gray-500 mb-4">Loading LIFF Data...</p>

                <img id="profileImage" class="profile-img mx-auto hidden" src="" alt="Profile">
                <h3 id="displayName" class="text-lg font-semibold"></h3>
                <p id="userIdDisplay" class="text-xs text-gray-400 mb-6"></p>

                <div id="statusBox" class="text-sm p-4 bg-gray-100 rounded-lg text-left hidden mb-4 overflow-auto max-h-40"></div>
                
                <button id="btnRetry" class="btn-orange text-white px-6 py-2 rounded-lg hidden w-full">ลองใหม่อีกครั้ง</button>
            </div>
        </div>

        <div id="mainApp" class="hidden min-h-full">
            <div class="bg-gradient-orange text-white p-6 shadow-md">
                <div class="max-w-7xl mx-auto flex justify-between items-center">
                    <div>
                        <h1 class="text-2xl font-bold">บันทึกข้อมูลความเคลื่อนไหว</h1>
                        <p id="reporterInfo" class="text-orange-100 text-sm mt-1"></p>
                    </div>
                    <button onclick="liff.logout(); location.reload();" class="bg-white text-orange-600 px-4 py-2 rounded-lg text-sm font-bold">Log Out</button>
                </div>
            </div>

            <div class="bg-white border-b border-gray-200">
                <div class="max-w-7xl mx-auto px-4 flex gap-6">
                    <button class="tab-btn active px-4 py-4 font-bold text-gray-500" data-tab="form">บันทึกใหม่</button>
                    <button class="tab-btn px-4 py-4 font-bold text-gray-500" data-tab="dashboard">แดชบอร์ด</button>
                </div>
            </div>

            <div class="max-w-7xl mx-auto px-4 py-8">
                <div id="formTab" class="tab-content">
                    <form id="dataForm" class="bg-white rounded-xl card-shadow p-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label class="block text-sm font-medium mb-2">วันที่ *</label><input type="date" id="date" required class="w-full border p-2 rounded-lg"></div>
                            <div><label class="block text-sm font-medium mb-2">กลุ่มเคลื่อนไหว *</label><input type="text" id="group" required class="w-full border p-2 rounded-lg"></div>
                            <div class="md:col-span-2"><label class="block text-sm font-medium mb-2">สถานที่ *</label><input type="text" id="location" required class="w-full border p-2 rounded-lg"></div>
                            <div class="md:col-span-2"><label class="block text-sm font-medium mb-2">เรื่องที่เรียกร้อง *</label><textarea id="demands" required rows="3" class="w-full border p-2 rounded-lg"></textarea></div>
                            <div><label class="block text-sm font-medium mb-2">จำนวนคน</label><input type="number" id="count" class="w-full border p-2 rounded-lg"></div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-4">รูปภาพ (สูงสุด 5 รูป)</label>
                            <div id="imageContainer" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
                        </div>

                        <button type="submit" class="btn-orange text-white w-full py-3 rounded-lg font-bold">ส่งข้อมูลบันทึก</button>
                        <div id="formStatus" class="hidden p-4 rounded-lg"></div>
                    </form>
                </div>

                <div id="dashboardTab" class="tab-content hidden">
                    <div class="bg-white rounded-xl card-shadow p-6 mb-8">
                        <canvas id="barChart" style="max-height: 300px;"></canvas>
                    </div>
                    <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global Error Handler สำหรับ LIFF
        window.onerror = function (msg, url, lineNo) {
            const box = document.getElementById("statusBox");
            if (box) {
                box.style.display = "block";
                box.innerHTML = `<div class="text-red-600"><b>[Error]:</b> ${msg}<br><small>Line: ${lineNo}</small></div>`;
            }
            return false;
        };

        (function () {
            // ==========================================
            // ⚙️ Configurations
            // ==========================================
            const CONFIG = {
                LIFF_ID: "2009416313-L7wUI9rt", // จาก app_00001
                SSO_API_URL: "https://script.google.com/macros/s/AKfycbwyI-KJlJzK1kKLkArN5aTgI5mefFJWbNXxvFG8jC011zn49lNAIkmm6BY1FMWYHuP6/exec",
                DATA_API_URL: "https://script.google.com/macros/s/AKfycbw94pRu7JwSZ9OxIFGFIqNu_M8t64VSkw2i50aEtZRWEs8mIkD_vlHHsmiEq61uPYyG/exec",
                APP_CODE: "app_00001"
            };

            let authorizedUser = null;

            // ==========================================
            // 📡 API Stub (ถอดแบบจาก app_00001)
            // ==========================================
            const ApiStub = {
                async sendRequest(url, action, payloadData) {
                    const payload = { action: action, payload: payloadData };
                    try {
                        const response = await fetch(url, {
                            method: "POST",
                            body: JSON.stringify(payload),
                            headers: { "Content-Type": "text/plain;charset=utf-8" } // สำคัญมาก! 
                        });
                        if (!response.ok) throw new Error(`HTTP Error! Status: ${response.status}`);
                        return await response.json();
                    } catch (error) {
                        console.error("API Error:", error);
                        throw error;
                    }
                }
            };

            // ==========================================
            // 🚀 Authentication Flow
            // ==========================================
            async function initializeLiff() {
                const statusBox = document.getElementById("statusBox");
                const loadingText = document.getElementById("loadingText");
                statusBox.classList.remove("hidden");
                statusBox.innerText = "กำลังเริ่มต้น LINE SDK...";

                try {
                    // Timeout logic จาก app_00001 
                    const timeoutPromise = new Promise((_, reject) =>
                        setTimeout(() => reject(new Error("LIFF Init Timeout (10s)")), 10000)
                    );

                    await Promise.race([
                        liff.init({ liffId: CONFIG.LIFF_ID }),
                        timeoutPromise
                    ]);

                    if (!liff.isLoggedIn()) {
                        liff.login();
                        return;
                    }

                    const profile = await liff.getProfile();
                    loadingText.style.display = "none";
                    document.getElementById("profileImage").src = profile.pictureUrl;
                    document.getElementById("profileImage").classList.remove("hidden");
                    document.getElementById("displayName").innerText = "สวัสดี, " + profile.displayName;
                    document.getElementById("userIdDisplay").innerText = profile.userId;

                    statusBox.innerText = "กำลังยืนยันสิทธิ์ SSO (Step 1)...";
                    const res1 = await ApiStub.sendRequest(CONFIG.SSO_API_URL, "liff_auth", { lineUserId: profile.userId });
                    if (res1.status !== 200) throw new Error(res1.message);

                    statusBox.innerText = "กำลังตรวจสอบสิทธิ์แอป (Step 2)...";
                    const res2 = await ApiStub.sendRequest(CONFIG.SSO_API_URL, "sso_auth", { lineUserId: profile.userId, appCode: CONFIG.APP_CODE });
                    if (res2.status !== 200) throw new Error(res2.message);

                    // Login Success
                    authorizedUser = {
                        lineUserId: profile.userId,
                        firstName: res2.data.firstName,
                        employeeNo: res2.data.employeeNo
                    };

                    document.getElementById("loginScreen").classList.add("hidden");
                    document.getElementById("mainApp").classList.remove("hidden");
                    document.getElementById("reporterInfo").innerText = `ผู้รายงาน: ${authorizedUser.firstName} (${authorizedUser.employeeNo})`;
                    
                    initForm();
                } catch (err) {
                    statusBox.innerHTML = `<span class="text-red-600 font-bold">❌ Error: ${err.message}</span>`;
                    document.getElementById("btnRetry").classList.remove("hidden");
                }
            }

            // ==========================================
            // 📝 App Logic
            // ==========================================
            function initForm() {
                document.getElementById('date').valueAsDate = new Date();
                const container = document.getElementById('imageContainer');
                for (let i = 0; i < 5; i++) {
                    const div = document.createElement('div');
                    div.className = "border-2 border-dashed border-gray-300 rounded-lg h-24 flex items-center justify-center cursor-pointer relative overflow-hidden";
                    div.innerHTML = `<i data-lucide="image-plus" class="text-gray-400"></i><input type="file" accept="image/*" class="hidden"><img class="hidden absolute inset-0 w-full h-full object-cover">`;
                    div.onclick = () => div.querySelector('input').click();
                    div.querySelector('input').onchange = (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                div.querySelector('img').src = ev.target.result;
                                div.querySelector('img').classList.remove('hidden');
                                div.querySelector('i').classList.add('hidden');
                            };
                            reader.readAsDataURL(file);
                        }
                    };
                    container.appendChild(div);
                }
                lucide.createIcons();
            }

            document.getElementById('dataForm').onsubmit = async (e) => {
                e.preventDefault();
                const status = document.getElementById('formStatus');
                status.classList.remove('hidden', 'bg-green-100', 'bg-red-100');
                status.innerText = "กำลังบันทึกข้อมูล...";
                status.className = "p-4 rounded-lg bg-blue-100 text-blue-700";

                const formData = {
                    timestamp: new Date().toLocaleString('th-TH'),
                    date: document.getElementById('date').value,
                    group: document.getElementById('group').value,
                    location: document.getElementById('location').value,
                    demands: document.getElementById('demands').value,
                    count: document.getElementById('count').value || '0',
                    reporterName: authorizedUser.firstName,
                    reporterId: authorizedUser.employeeNo,
                    lineId: authorizedUser.lineUserId,
                    images: []
                };

                // รวบรวมรูป
                const imgElements = document.querySelectorAll('#imageContainer img');
                imgElements.forEach(img => { if (img.src) formData.images.push(img.src); });

                try {
                    const res = await ApiStub.sendRequest(CONFIG.DATA_API_URL, "save", formData);
                    if (res.success) {
                        status.className = "p-4 rounded-lg bg-green-100 text-green-700";
                        status.innerText = "✅ บันทึกข้อมูลสำเร็จเรียบร้อยแล้ว";
                        document.getElementById('dataForm').reset();
                        document.querySelectorAll('#imageContainer img').forEach(i => i.classList.add('hidden'));
                        document.querySelectorAll('#imageContainer i').forEach(i => i.classList.remove('hidden'));
                    } else {
                        throw new Error(res.error);
                    }
                } catch (err) {
                    status.className = "p-4 rounded-lg bg-red-100 text-red-700";
                    status.innerText = "❌ เกิดข้อผิดพลาด: " + err.message;
                }
            };

            // Tab Switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = (e) => {
                    const tab = e.target.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                    e.target.classList.add('active');
                    document.getElementById(tab + 'Tab').classList.remove('hidden');
                };
            });

            document.getElementById("btnRetry").onclick = () => location.reload();
            document.addEventListener("DOMContentLoaded", initializeLiff);
        })();
    </script>
</body>
</html>
