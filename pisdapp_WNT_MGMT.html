<!DOCTYPE html>
<html lang="th" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบงานหมายจับ - SSO Mode</title>
    <!-- DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            box-sizing: border-box;
        }

        .gradient-header {
            /* Warrant Management themed gradient (Violet/Purple) */
            background: linear-gradient(135deg, #4c1d95 0%, #6d28d9 50%, #8b5cf6 100%);
        }

        .card-shadow {
            box-shadow: 0 4px 15px rgba(109, 40, 217, 0.1);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            margin: 0 auto 1.5rem;
        }
    </style>
</head>

<body class="h-full bg-slate-50">
    <div id="app" class="h-full w-full overflow-auto">

        <!-- Login Page -->
        <div id="loginPage" class="min-h-full flex items-center justify-center p-4 gradient-header">
            <div class="w-full max-w-md">
                <div class="bg-white rounded-3xl shadow-2xl p-8 text-center">
                    <h2 class="text-2xl font-bold text-violet-800 mb-2">PISD6 SSO Portal</h2>
                    <p class="text-gray-500 text-sm mb-6">ระบบงานหมายจับ (Warrant Management)</p>

                    <div id="authFlow">
                        <p id="loadingText" class="text-violet-500 font-semibold animate-pulse">กำลังตรวจสอบสิทธิ์ด้วย
                            LINE...</p>
                        <img id="profileImage" class="profile-img hidden shadow-lg" src="" alt="Profile">
                        <h3 id="displayName" class="text-xl font-bold text-gray-800"></h3>

                        <div id="statusBox"
                            class="hidden mt-4 bg-gray-50 p-4 rounded-2xl text-left text-sm border-l-4 border-violet-500">
                        </div>
                        <button id="btnRetry"
                            class="hidden w-full mt-4 bg-violet-600 text-white py-3 rounded-xl font-bold hover:bg-violet-700 transition">ลองใหม่อีกครั้ง</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main App (Dashboard) -->
        <div id="mainApp" class="hidden min-h-full flex flex-col">
            <header class="gradient-header text-white py-6 px-4 shadow-lg">
                <div class="max-w-7xl mx-auto flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="bg-white/20 p-3 rounded-full">
                            <!-- Paper/Document Search icon for Warrants -->
                            <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                                </path>
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold tracking-wide">ระบบงานหมายจับ</h1>
                            <p id="officerInfo" class="text-violet-100 text-xs md:text-sm font-medium"></p>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-8">
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-gray-800">เมนูระบบงานหมายจับ</h2>
                    <p class="text-gray-500">กรุณาเลือกระบบงานที่ต้องการปฏิบัติหน้าที่ (Warrant Management)</p>
                </div>

                <!-- 
                    Responsive Grid Rules:
                    - <= 639px (xs): grid-cols-2
                    - >= 640px (sm): grid-cols-3
                    - >= 768px (md): grid-cols-4
                    - >= 1024px (lg): grid-cols-6
                    - >= 1280px (xl): grid-cols-8
                -->
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4">

                    <!-- Menu 1 (Primary Menu provided by User) -->
                    <a href="https://liff.line.me/2009416313-DXQoMEIm"
                        class="card bg-white card-shadow hover:-translate-y-1 transition-transform duration-300 cursor-pointer border border-violet-50">
                        <div class="card-body items-center text-center p-4">
                            <div
                                class="w-12 h-12 bg-violet-100 text-violet-600 rounded-full flex items-center justify-center mb-2">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
                                    </path>
                                </svg>
                            </div>
                            <h3 class="font-semibold text-sm text-gray-800 line-clamp-2">บันทึกการจับกุมตามหมายจับ</h3>
                        </div>
                    </a>

                    <!-- Mock Menu 2 -->
                    <a href="#"
                        class="card bg-white card-shadow hover:-translate-y-1 transition-transform duration-300 cursor-pointer border border-violet-50">
                        <div class="card-body items-center text-center p-4">
                            <div
                                class="w-12 h-12 bg-fuchsia-100 text-fuchsia-600 rounded-full flex items-center justify-center mb-2">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z">
                                    </path>
                                </svg>
                            </div>
                            <h3 class="font-semibold text-sm text-gray-800 line-clamp-2">ตรวจสอบและค้นหา</h3>
                        </div>
                    </a>

                    <!-- Mock Menu 3 -->
                    <a href="#"
                        class="card bg-white card-shadow hover:-translate-y-1 transition-transform duration-300 cursor-pointer border border-violet-50">
                        <div class="card-body items-center text-center p-4">
                            <div
                                class="w-12 h-12 bg-pink-100 text-pink-600 rounded-full flex items-center justify-center mb-2">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                                    </path>
                                </svg>
                            </div>
                            <h3 class="font-semibold text-sm text-gray-800 line-clamp-2">แก้ไขสถานะ</h3>
                        </div>
                    </a>
                </div>
            </main>
        </div>
    </div>

    <!-- DaisyUI Modal -->
    <dialog id="sysModal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box text-center">
            <h3 class="font-bold text-xl mb-2 text-gray-800" id="modalTitle">แจ้งเตือน</h3>
            <p class="py-4 text-base text-gray-600" id="modalMessage"></p>
            <div class="modal-action  justify-center">
                <form method="dialog" class="w-full">
                    <button id="modalBtn" class="btn w-full text-white text-lg">ตกลง</button>
                </form>
            </div>
        </div>
    </dialog>

    <script>
        function sysAlert(message, type = 'info', title = 'แจ้งเตือน', callback = null) {
            const dialog = document.getElementById('sysModal');
            const btn = document.getElementById('modalBtn');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerText = message;
            btn.className = 'btn w-full text-white text-lg ' + (type === 'error' ? 'btn-error' : type === 'success' ? 'btn-success' : 'btn-info');
            dialog.onclose = callback ? () => { callback(); dialog.onclose = null; } : null;
            dialog.showModal();
        }

        function logout() {
            localStorage.removeItem("pisd_session");
            localStorage.removeItem("pisd_profile_pic");
            location.reload();
        }

        (function () {
            // ==========================================
            // ⚙️ Configurations
            // ==========================================
            const CONFIG = {
                // LIFF ID for WNT_MGMT application
                LIFF_ID: "2009416313-jf2ALE5r",
                SSO_API_URL: "https://script.google.com/macros/s/AKfycbwyI-KJlJzK1kKLkArN5aTgI5mefFJWbNXxvFG8jC011zn49lNAIkmm6BY1FMWYHuP6/exec",
                APP_CODE: "pisdapp_WNT_MGMT" // รหัสแอประบบงานหมายจับ
            };

            let authorizedUser = null;

            const ApiStub = {
                async sendRequest(url, action, payloadData = {}) {
                    const payload = { action, payload: payloadData };
                    const response = await fetch(url, {
                        method: "POST",
                        body: JSON.stringify(payload),
                        headers: { "Content-Type": "text/plain;charset=utf-8" }
                    });
                    const resJson = await response.json();
                    if (resJson.status === 401 || resJson.status === 403) {
                        sysAlert("Session หมดอายุ หรือคุณไม่มีสิทธิ์การใช้งาน กรุณาเข้าสู่ระบบใหม่", "error", "ตรวจสอบสิทธิ์ล้มเหลว", () => {
                            logout();
                        });
                        throw new Error("Unauthorized");
                    }
                    return resJson;
                }
            };

            // ==========================================
            // 🔐 SSO Core Logic
            // ==========================================
            async function startSSO() {
                const statusBox = document.getElementById("statusBox");
                try {
                    statusBox.classList.remove("hidden");

                    // ----------------------------------------------------------------
                    // Usecase 2: ตรวจสอบ Session Resumption 
                    // ----------------------------------------------------------------
                    const cachedSessionStr = localStorage.getItem("pisd_session");
                    if (cachedSessionStr) {
                        statusBox.innerText = "กำลังกู้คืน Session เดิม...";
                        const cachedSession = JSON.parse(cachedSessionStr);
                        const resumeRes = await ApiStub.sendRequest(CONFIG.SSO_API_URL, "resume_session", {
                            sid: cachedSession.sid,
                            appCode: CONFIG.APP_CODE
                        });

                        if (resumeRes.status === 200) {
                            const profilePic = localStorage.getItem("pisd_profile_pic") || "";
                            document.getElementById("loadingText").classList.add("hidden");
                            if (profilePic) {
                                document.getElementById("profileImage").src = profilePic;
                                document.getElementById("profileImage").classList.remove("hidden");
                            }
                            document.getElementById("displayName").innerText = "ยินดีต้อนรับกลับ, " + resumeRes.data.userProfile.fullName;

                            await new Promise(resolve => setTimeout(resolve, 800));

                            authorizedUser = {
                                lineUserId: cachedSession.lineId,
                                firstName: resumeRes.data.userProfile.fullName,
                                employeeNo: resumeRes.data.userProfile.employeeNo
                            };

                            launchAppWorkspace();
                            return;
                        } else {
                            localStorage.removeItem("pisd_session");
                            localStorage.removeItem("pisd_profile_pic");
                        }
                    }

                    // ----------------------------------------------------------------
                    // Usecase 1: LINE SDK
                    // ----------------------------------------------------------------
                    statusBox.innerText = "กำลังตรวจสอบตัวตน LINE...";

                    await liff.init({ liffId: CONFIG.LIFF_ID });
                    if (!liff.isLoggedIn()) { liff.login(); return; }

                    const profile = await liff.getProfile();
                    localStorage.setItem("pisd_profile_pic", profile.pictureUrl);

                    document.getElementById("loadingText").classList.add("hidden");
                    document.getElementById("profileImage").src = profile.pictureUrl;
                    document.getElementById("profileImage").classList.remove("hidden");
                    document.getElementById("displayName").innerText = "สวัสดี, " + profile.displayName;

                    statusBox.innerText = "กำลังยืนยันสิทธิ์ SSO กับฐานข้อมูลกลาง...";
                    // ⚡ (Optimized): ยิง sso_auth ตัวเดียวจบ ระบบฝั่ง Server จะแสกนทั้งตัว User Status และ App Status ให้
                    const res2 = await ApiStub.sendRequest(CONFIG.SSO_API_URL, "sso_auth", { lineUserId: profile.userId, appCode: CONFIG.APP_CODE });

                    if (res2.status !== 200) throw new Error(res2.message);

                    const authData = res2.data.auth;
                    localStorage.setItem(`pisd_session`, JSON.stringify({
                        sid: authData.sid,
                        exp_dt: authData.exp_dt,
                        lineId: profile.userId
                    }));

                    authorizedUser = { lineUserId: profile.userId, firstName: res2.data.userProfile.fullName, employeeNo: res2.data.userProfile.employeeNo };
                    launchAppWorkspace();

                } catch (err) {
                    statusBox.innerHTML = `<span class="text-red-600 font-bold">❌ Error:</span> ${err.message}`;
                    document.getElementById("btnRetry").classList.remove("hidden");
                }
            }

            function launchAppWorkspace() {
                document.getElementById("loginPage").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                document.getElementById("officerInfo").innerText = `เจ้าหน้าที่: คุณ${authorizedUser.firstName} (${authorizedUser.employeeNo})`;
            }

            document.getElementById("btnRetry").onclick = () => location.reload();
            document.addEventListener("DOMContentLoaded", startSSO);
        })();
    </script>
</body>

</html>
