<!DOCTYPE html>
<html lang="th" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบทะเบียนคุมเลขคำสั่ง - SSO Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <script src="/_sdk/data_sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            box-sizing: border-box;
        }

        .gradient-header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #1e3a8a 100%);
        }

        .card-shadow {
            box-shadow: 0 4px 15px rgba(30, 64, 175, 0.1);
        }

        .tab-active {
            border-bottom: 3px solid #2563eb;
            color: #2563eb;
            font-weight: 600;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            margin: 0 auto 1.5rem;
        }

        .loading-spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="h-full bg-gray-50">
    <div id="app" class="h-full overflow-auto">

        <div id="loginPage" class="min-h-full flex items-center justify-center p-4 gradient-header">
            <div class="w-full max-w-md">
                <div class="bg-white rounded-3xl shadow-2xl p-8 text-center">
                    <h2 class="text-2xl font-bold text-blue-800 mb-2">PISD6 SSO Portal</h2>
                    <p class="text-gray-500 text-sm mb-6">ระบบทะเบียนคุมเลขคำสั่ง</p>

                    <div id="authFlow">
                        <p id="loadingText" class="text-blue-600 font-semibold animate-pulse">กำลังเชื่อมต่อ LINE...</p>
                        <img id="profileImage" class="profile-img hidden shadow-lg" src="" alt="Profile">
                        <h3 id="displayName" class="text-xl font-bold text-gray-800"></h3>

                        <div id="statusBox"
                            class="hidden mt-4 bg-gray-50 p-4 rounded-2xl text-left text-sm border-l-4 border-blue-600">
                        </div>
                        <button id="btnRetry"
                            class="hidden w-full mt-4 bg-blue-600 text-white py-3 rounded-xl font-bold">ลองใหม่อีกครั้ง</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="mainApp" class="hidden min-h-full flex flex-col">
            <header class="gradient-header text-white py-4 px-6 shadow-lg">
                <div class="max-w-6xl mx-auto flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="bg-white/20 p-3 rounded-full">
                            <svg class="w-8 h-8" fill="currentColor" viewbox="0 0 24 24">
                                <path
                                    d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z" />
                                <path d="M8 12h8v2H8zm0 4h8v2H8z" />
                            </svg>
                        </div>
                        <div>
                            <h1 id="app-title" class="text-2xl font-bold">ระบบทะเบียนคุมเลขคำสั่ง</h1>
                            <p id="officerInfo" class="text-blue-100 text-sm"></p>
                        </div>
                    </div>
                    <a href="https://liff.line.me/2009416313-yfoJaKGr" class="flex items-center gap-2 bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition-colors backdrop-blur text-sm font-semibold text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        <span class="hidden sm:inline">กลับเมนูหลัก</span>
                    </a>
                </div>
            </header>

            <div class="bg-white border-b sticky top-0 z-10">
                <div class="max-w-6xl mx-auto flex">
                    <button class="tab-btn px-6 py-4 font-medium text-gray-600 tab-active"
                        data-tab="form">บันทึกคำสั่ง</button>
                    <button class="tab-btn px-6 py-4 font-medium text-gray-600" data-tab="report">รายงาน</button>
                </div>
            </div>

            <main class="max-w-6xl mx-auto w-full p-4 md:p-8">
                <div id="form-section" class="tab-content">
                    <div class="max-w-3xl mx-auto bg-white rounded-2xl card-shadow p-8">
                        <h2 class="text-xl font-bold mb-6 pb-4 border-b">บันทึกคำสั่งใหม่</h2>
                        <form id="order-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium mb-2">เลขที่คำสั่ง *</label>
                                    <input type="text" id="order-number" required
                                        class="w-full px-4 py-3 border rounded-xl" placeholder="เช่น 001/2568">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-2">วันที่ออกคำสั่ง *</label>
                                    <input type="date" id="order-date" required
                                        class="w-full px-4 py-3 border rounded-xl">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">เรื่อง *</label>
                                <input type="text" id="subject" required class="w-full px-4 py-3 border rounded-xl"
                                    placeholder="ระบุเรื่องของคำสั่ง">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">หน่วยงานที่ปฏิบัติ *</label>
                                <select id="department" required class="w-full px-4 py-3 border rounded-xl bg-white">
                                    <option value="">-- เลือกหน่วยงาน --</option>
                                    <option value="งานอำนวยการ">งานอำนวยการ</option>
                                    <option value="งานการข่าว">งานการข่าว</option>
                                    <option value="งานยาเสพติด">งานยาเสพติด</option>
                                    <option value="นปพ.">นปพ.</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-2">เอกสาร PDF</label>
                                <input type="file" id="pdf-file" accept=".pdf" class="w-full border p-2 rounded-xl">
                            </div>
                            <button type="submit" id="submit-btn"
                                class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-blue-700 transition">
                                <span id="submit-text">บันทึกข้อมูล</span>
                            </button>
                        </form>
                    </div>
                </div>

                <div id="report-section" class="tab-content hidden">
                    <div class="bg-white rounded-2xl card-shadow p-6">
                        <h2 class="text-xl font-bold mb-4">รายงานข้อมูลคำสั่ง</h2>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left">
                                <tbody id="report-table"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        (function () {
            // ==========================================
            // ⚙️ Configurations
            // ==========================================
            const CONFIG = {
                LIFF_ID: "2009416313-vnvWDia7", // LIFF ID ตามที่คุณระบุ
                SSO_API_URL: "https://script.google.com/macros/s/AKfycbwyI-KJlJzK1kKLkArN5aTgI5mefFJWbNXxvFG8jC011zn49lNAIkmm6BY1FMWYHuP6/exec",
                DATA_API_URL: "https://script.google.com/macros/s/AKfycbw94pRu7JwSZ9OxIFGFIqNu_M8t64VSkw2i50aEtZRWEs8mIkD_vlHHsmiEq61uPYyG/exec",
                APP_CODE: "pisdapp_00003"
            };

            let authorizedUser = null;
            let allOrders = [];

            function logout() {
                localStorage.removeItem("pisd_session");
                localStorage.removeItem("pisd_profile_pic");
                location.reload();
            }

            const ApiStub = {
                async sendRequest(url, action, payloadData = {}) {
                    // แนบ SID ถ้ายิงเข้า DATA_API
                    const sessionStr = localStorage.getItem("pisd_session");
                    if (sessionStr && url === CONFIG.DATA_API_URL) {
                        try {
                            const session = JSON.parse(sessionStr);
                            if (session.sid && !payloadData.sid) {
                                payloadData.sid = session.sid;
                            }
                        } catch (e) { }
                    }

                    const payload = { action, payload: payloadData };
                    const response = await fetch(url, {
                        method: "POST",
                        body: JSON.stringify(payload),
                        headers: { "Content-Type": "text/plain;charset=utf-8" } // ป้องกัน CORS
                    });
                    const resJson = await response.json();

                    if (resJson.status === 401 || resJson.status === 403) {
                        alert("Session หมดอายุ หรือคุณไม่มีสิทธิ์การใช้งาน กรุณาเข้าสู่ระบบใหม่");
                        logout();
                        throw new Error("Unauthorized");
                    }
                    return resJson;
                }
            };

            // ==========================================
            // 🚀 SSO Logic
            // ==========================================
            async function initSSO() {
                const statusBox = document.getElementById("statusBox");
                try {
                    statusBox.classList.remove("hidden");

                    // 1. ลองกู้คืน Session เดิม
                    const cachedSessionStr = localStorage.getItem("pisd_session");
                    if (cachedSessionStr) {
                        statusBox.innerText = "กำลังกู้คืน Session เดิม...";
                        const cachedSession = JSON.parse(cachedSessionStr);
                        const resumeRes = await ApiStub.sendRequest(CONFIG.SSO_API_URL, "resume_session", {
                            sid: cachedSession.sid,
                            appCode: CONFIG.APP_CODE
                        });

                        if (resumeRes.status === 200) {
                            const profilePic = localStorage.getItem("pisd_profile_pic") || "";
                            document.getElementById("loadingText").classList.add("hidden");
                            if (profilePic) {
                                document.getElementById("profileImage").src = profilePic;
                                document.getElementById("profileImage").classList.remove("hidden");
                            }

                            const fName = resumeRes.data.userProfile?.fullName || resumeRes.data.firstName || "เจ้าหน้าที่";
                            const empNo = resumeRes.data.userProfile?.employeeNo || resumeRes.data.employeeNo || "";
                            document.getElementById("displayName").innerText = "ยินดีต้อนรับกลับ, " + fName;

                            authorizedUser = {
                                lineUserId: cachedSession.lineId,
                                firstName: fName,
                                employeeNo: empNo
                            };

                            await new Promise(r => setTimeout(r, 800)); // หน่วง UI ให้เห็นว่ากู้คืนสำเร็จ
                            launchAppWorkspace();
                            return;
                        } else {
                            // ถ้าข้อมูลเสีย, หมดอายุ, หรือถูกระงับ
                            localStorage.removeItem("pisd_session");
                            localStorage.removeItem("pisd_profile_pic");
                        }
                    }

                    // 2. ไปที่ LINE SDK
                    statusBox.innerText = "กำลังเริ่มต้น LINE LIFF...";
                    await liff.init({ liffId: CONFIG.LIFF_ID });
                    if (!liff.isLoggedIn()) { liff.login(); return; }

                    const profile = await liff.getProfile();
                    localStorage.setItem("pisd_profile_pic", profile.pictureUrl);

                    document.getElementById("loadingText").classList.add("hidden");
                    document.getElementById("profileImage").src = profile.pictureUrl;
                    document.getElementById("profileImage").classList.remove("hidden");
                    document.getElementById("displayName").innerText = "สวัสดี, " + profile.displayName;

                    statusBox.innerText = "กำลังทดสอบสิทธิ์แอป (SSO)...";
                    const res2 = await ApiStub.sendRequest(CONFIG.SSO_API_URL, "sso_auth", { lineUserId: profile.userId, appCode: CONFIG.APP_CODE });
                    if (res2.status !== 200) throw new Error(res2.message);

                    // เก็บตั๋ว Session ชิ้นใหม่ลงกระเป๋า
                    const authData = res2.data.auth;
                    localStorage.setItem("pisd_session", JSON.stringify({
                        sid: authData.sid,
                        exp_dt: authData.exp_dt,
                        lineId: profile.userId
                    }));

                    const fName = res2.data.userProfile?.fullName || res2.data.firstName || "";
                    const empNo = res2.data.userProfile?.employeeNo || res2.data.employeeNo || "";

                    authorizedUser = { lineUserId: profile.userId, firstName: fName, employeeNo: empNo };

                    launchAppWorkspace();
                } catch (err) {
                    statusBox.innerHTML = `<span class="text-red-600 font-bold">❌ Error:</span> ${err.message}`;
                    document.getElementById("btnRetry").classList.remove("hidden");
                }
            }

            function launchAppWorkspace() {
                document.getElementById("loginPage").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                document.getElementById("officerInfo").innerText = `เจ้าหน้าที่: คุณ${authorizedUser.firstName} (${authorizedUser.employeeNo})`;

                initAppData();
            }

            // ==========================================
            // 📊 Data & App Logic
            // ==========================================
            function initAppData() {
                document.getElementById('order-date').valueAsDate = new Date();
                loadFromGoogleSheet();
                setupTabs();
            }

            async function loadFromGoogleSheet() {
                try {
                    // ดึงข้อมูลแดชบอร์ด/รายงาน
                    const res = await fetch(CONFIG.DATA_API_URL + "?action=getData");
                    const result = await res.json();
                    allOrders = result.records || [];
                    renderTable(allOrders);
                } catch (err) { console.error("Sheet Load Error", err); }
            }

            function renderTable(data) {
                document.getElementById("report-table").innerHTML = data.slice(-10).reverse().map((o, i) => `
          <tr class="border-b"><td class="p-3">${o.order_number}</td><td class="p-3">${o.subject}</td><td class="p-3 text-right text-blue-600 font-bold">${o.department}</td></tr>
        `).join('');
            }

            document.getElementById("order-form").onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById("submit-btn");
                btn.disabled = true;

                const payload = {
                    order_number: document.getElementById('order-number').value,
                    subject: document.getElementById('subject').value,
                    order_date: document.getElementById('order-date').value,
                    department: document.getElementById('department').value,
                    // ผูกข้อมูลเจ้าหน้าที่จาก SSO อัตโนมัติ
                    reporterName: authorizedUser.firstName,
                    reporterId: authorizedUser.employeeNo,
                    lineId: authorizedUser.lineUserId,
                    created_at: new Date().toISOString()
                };

                try {
                    const res = await ApiStub.sendRequest(CONFIG.DATA_API_URL, "save", payload);
                    if (res.success) {
                        alert("บันทึกข้อมูลเรียบร้อยแล้ว");
                        document.getElementById("order-form").reset();
                        loadFromGoogleSheet();
                    } else throw new Error(res.error);
                } catch (err) { alert("เกิดข้อผิดพลาด: " + err.message); }
                finally { btn.disabled = false; }
            };

            function setupTabs() {
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.onclick = (e) => {
                        const tab = e.target.dataset.tab;
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                        e.target.classList.add('tab-active');
                        document.getElementById(`${tab}-section`).classList.remove('hidden');
                    };
                });
            }

            document.getElementById("btnRetry").onclick = () => location.reload();
            document.addEventListener("DOMContentLoaded", initSSO);
        })();
    </script>
</body>

</html>
