<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISD6 App 00002</title>
    <!-- Include LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; color: #333; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #00B900; margin-bottom: 5px; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 15px; display: none; object-fit: cover; border: 2px solid #ddd; }
        .btn { background-color: #00B900; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 15px; transition: background 0.3s; }
        .btn:hover { background-color: #009900; }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
        .status-box { margin-top: 20px; padding: 15px; border-radius: 8px; background-color: #e9ecef; font-size: 14px; text-align: left; word-break: break-all; display: none; }
        .error-text { color: #dc3545; font-weight: bold; }
        .success-text { color: #28a745; font-weight: bold; }
    </style>
</head>

<body>
    <div class="container">
        <h2>PISD6 Portal</h2>
        <p id="loadingText">Loading LIFF Data...</p>
        <img id="profileImage" class="profile-img" src="" alt="Profile Image">
        <h3 id="displayName"></h3>
        <p id="userIdDisplay" style="font-size: 12px; color: #777;"></p>
        <button id="btnEnterApp" class="btn" style="display: none;">เข้าสู่ระบบ PISD6 (SSO Auth)</button>
        <div id="statusBox" class="status-box"></div>
    </div>

    <script>
        window.onerror = function (msg, url, lineNo) {
            var box = document.getElementById("statusBox");
            if (box) { box.style.display = "block"; box.innerHTML = '<div class="error-text"><b>[Global Error]:</b> ' + msg + '<br><small>Line: ' + lineNo + '</small></div>'; }
            return false;
        };

        (function () {
            const CONFIG = {
                LIFF_ID: "2009416313-HqTDFq45", // <--- แก้ไขตาม LIFF ID ของแอปนี้
                GAS_WEBAPP_URL: "https://script.google.com/macros/s/AKfycbwyI-KJlJzK1kKLkArN5aTgI5mefFJWbNXxvFG8jC011zn49lNAIkmm6BY1FMWYHuP6/exec",
                APP_CODE: "app_00002" // <--- แก้ไขตาม App Code ที่ต้องการ
            };

            const ApiStub = {
                async sendRequest(action, data) {
                    const payload = { action, payload: data };
                    try {
                        const response = await fetch(CONFIG.GAS_WEBAPP_URL, {
                            method: "POST",
                            body: JSON.stringify(payload),
                            headers: { "Content-Type": "text/plain;charset=utf-8" }
                        });
                        return await response.json();
                    } catch (error) { console.error("API Error:", error); throw error; }
                },
                async authLiff(lineUserId) { return this.sendRequest("liff_auth", { lineUserId }); },
                async authSso(lineUserId, appCode) { return this.sendRequest("sso_auth", { lineUserId, appCode }); }
            };

            const ViewController = {
                elements: {
                    profileImage: document.getElementById("profileImage"),
                    displayName: document.getElementById("displayName"),
                    userIdDisplay: document.getElementById("userIdDisplay"),
                    btnEnterApp: document.getElementById("btnEnterApp"),
                    statusBox: document.getElementById("statusBox"),
                    loadingText: document.getElementById("loadingText")
                },
                init() { if (!CONFIG.LIFF_ID) { this.showStatus("กรุณาใส่ LIFF ID!", true); return false; } return true; },
                displayProfile(profile) {
                    this.elements.loadingText.style.display = "none";
                    if (profile.pictureUrl) { this.elements.profileImage.src = profile.pictureUrl; this.elements.profileImage.style.display = "inline-block"; }
                    this.elements.displayName.innerText = "สวัสดี, " + profile.displayName;
                    this.elements.userIdDisplay.innerText = profile.userId;
                },
                showStatus(text, isError = false) {
                    this.elements.statusBox.style.display = "block";
                    this.elements.statusBox.innerHTML = isError ? `<span class="error-text">${text}</span>` : text;
                },
                setupButton(text, isEnabled, onClick) {
                    this.elements.btnEnterApp.innerText = text;
                    this.elements.btnEnterApp.disabled = !isEnabled;
                    this.elements.btnEnterApp.style.display = "block";
                    if (onClick) this.elements.btnEnterApp.onclick = onClick;
                }
            };

            let currentUserId = "";

            async function initializeLiff() {
                ViewController.showStatus("กำลังโหลดหน้าเว็บ...");
                if (typeof liff === 'undefined') { ViewController.showStatus("❌ LINE SDK undefined", true); return; }
                if (!ViewController.init()) return;

                try {
                    ViewController.showStatus("กำลังเริ่มต้น LINE SDK...");
                    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout (10s)")), 10000));
                    await Promise.race([liff.init({ liffId: CONFIG.LIFF_ID }), timeout]);

                    if (liff.isLoggedIn()) {
                        const profile = await liff.getProfile();
                        ViewController.displayProfile(profile);
                        currentUserId = profile.userId;
                        await handleLiffAuth();
                    } else {
                        if (liff.isInClient()) { liff.login(); } 
                        else { ViewController.showStatus("⚠️ กรุณาเปิดแอปผ่าน LINE", true); ViewController.setupButton("Login (PC)", true, () => liff.login()); }
                    }
                } catch (err) {
                    const msg = `❌ Init Error: ${err.message}<br><small>URL: ${window.location.href}</small>`;
                    ViewController.showStatus(msg, true);
                    ViewController.elements.loadingText.style.display = "none";
                    ViewController.setupButton("ลองใหม่", true, () => window.location.reload());
                }
            }

            async function handleLiffAuth() {
                ViewController.showStatus("กำลังตรวจสอบสถานะบัญชี...");
                try {
                    const res = await ApiStub.authLiff(currentUserId);
                    if (res.status === 200) { await handleSsoAuth(CONFIG.APP_CODE); } 
                    else { ViewController.showStatus(`❌ บัญชีไม่พร้อม: ${res.message}<br><small>พิมพ์ activate:รหัสยืนยัน ในแชท</small>`, true); }
                } catch (e) { ViewController.showStatus(`Network Error (1): ${e.message}`, true); }
            }

            async function handleSsoAuth(appCode) {
                ViewController.showStatus(`กำลังตรวจสอบสิทธิ์แอป [${appCode}]...`);
                try {
                    const res = await ApiStub.authSso(currentUserId, appCode);
                    if (res.status === 200) { ViewController.showStatus(`✅ แอปพร้อมใช้งาน<br>ยินดีต้อนรับ คุณ ${res.data.firstName}`); } 
                    else { ViewController.showStatus(`❌ ไม่มีสิทธิ์: ${res.message}`, true); }
                } catch (e) { ViewController.showStatus(`Network Error (2): ${e.message}`, true); }
            }

            document.addEventListener("DOMContentLoaded", initializeLiff);
        })();
    </script>
</body>
</html>
