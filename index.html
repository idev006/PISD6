<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE LIFF Landing Page</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Prompt', sans-serif; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes pulse-ring { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-fade-in-up { animation: fade-in-up 0.6s ease-out forwards; }
    .animate-shimmer { background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2s infinite; }
    .cta-button { position: relative; overflow: hidden; transition: all 0.3s ease; }
    .cta-button::before { content: ''; position: absolute; inset: 0; border-radius: inherit; animation: pulse-ring 2s ease-out infinite; }
    .cta-button:active { transform: scale(0.96); }
    .status-dot { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .glass-card { backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  </style>
 </head>
 <body class="h-full bg-gradient-to-b from-sky-50 via-white to-sky-50 overflow-auto">
  <div id="app-wrapper" class="min-h-full w-full flex flex-col">
   <header id="header" class="w-full px-6 pt-8 pb-4 animate-fade-in-up" style="animation-delay: 0.1s;">
    <div class="flex items-center justify-center gap-3">
     <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-lg" id="logo-container" style="background-color: #06C755;">
      <svg width="24" height="24" viewbox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 5.92 2 10.67c0 2.61 1.47 4.93 3.77 6.52.16.11.26.29.26.49l-.15 1.85c-.05.62.55 1.08 1.11.85l2.08-.87c.18-.07.37-.08.55-.03.73.18 1.51.28 2.32.28 5.52 0 10-3.92 10-8.76C22 5.92 17.52 2 12 2z" /></svg>
     </div>
     <div class="text-center">
      <h1 id="app-title" class="text-xl font-semibold" style="color: #0EA5E9;">MTHYDRA Auth</h1>
      <p id="app-subtitle" class="text-sm" style="color: #94A3B8;">ระบบยืนยันตัวตน LIFF</p>
     </div>
    </div>
   </header>

   <section class="flex-1 flex flex-col items-center justify-center px-6 py-8">
    <div class="w-full max-w-sm glass-card rounded-3xl p-6 shadow-xl border animate-fade-in-up" id="profile-card" style="background-color: rgba(255, 255, 255, 0.8); border-color: #E0F2FE; animation-delay: 0.2s;">
     <div class="flex flex-col items-center mb-6">
      <div class="relative animate-float">
       <div class="w-24 h-24 rounded-full shadow-lg flex items-center justify-center overflow-hidden" id="avatar-bg" style="background: linear-gradient(135deg, #0EA5E9 0%, #38BDF8 100%);">
         <img id="user-picture" src="" class="w-full h-full object-cover hidden" />
         <svg id="user-icon-placeholder" class="w-12 h-12 text-white" fill="currentColor" viewbox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" /></svg>
       </div>
       <div class="absolute bottom-1 right-1 w-5 h-5 rounded-full border-2 border-white shadow-md" id="online-indicator" style="background-color: #94A3B8;"></div>
      </div>
      <p id="welcome-text" class="mt-4 text-lg font-medium" style="color: #334155;">ยินดีต้อนรับ</p>
      <p id="user-name" class="text-2xl font-semibold" style="color: #0EA5E9;">กำลังโหลด...</p>
      <p id="user-id-display" class="text-[10px] mt-1 opacity-50 break-all" style="color: #64748B;">ID: -</p>
     </div>

     <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="text-center p-3 rounded-2xl" style="background-color: #F0F9FF;">
       <p id="stat-1" class="text-xl font-semibold" style="color: #0EA5E9;">-</p>
       <p class="text-xs" style="color: #64748B;">สถานะ</p>
      </div>
      <div class="text-center p-3 rounded-2xl" style="background-color: #F0F9FF;">
       <p id="stat-2" class="text-xl font-semibold" style="color: #0EA5E9;">-</p>
       <p class="text-xs" style="color: #64748B;">ระดับ</p>
      </div>
      <div class="text-center p-3 rounded-2xl" style="background-color: #F0F9FF;">
       <p id="stat-3" class="text-xl font-semibold" style="color: #0EA5E9;">-</p>
       <p class="text-xs" style="color: #64748B;">คะแนน</p>
      </div>
     </div>

     <button id="cta-button" class="cta-button w-full py-4 px-6 rounded-2xl text-white font-semibold text-lg shadow-lg animate-fade-in-up" style="background: linear-gradient(135deg, #0EA5E9 0%, #06C755 100%); animation-delay: 0.3s;" onclick="handleCTA()"> 
      <span class="relative z-10 flex items-center justify-center gap-2">
       <svg id="btn-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
       <span id="button-text">ยืนยันตัวตนเข้าใช้งาน</span> 
      </span> 
     </button>
    </div>
   </section>

   <footer class="w-full px-6 pb-8 animate-fade-in-up" style="animation-delay: 0.4s;">
    <div id="status-container" class="max-w-sm mx-auto rounded-2xl p-4 border" style="background-color: #F0F9FF; border-color: #E0F2FE;">
     <div class="flex items-center justify-center gap-3">
      <div class="status-dot w-2 h-2 rounded-full" id="status-dot" style="background-color: #F59E0B;"></div>
      <p id="status-text" class="text-sm" style="color: #64748B;">กำลังเริ่มระบบ LIFF...</p>
     </div>
     <div class="mt-3 h-1 rounded-full overflow-hidden" style="background-color: #E0F2FE;">
      <div id="progress-bar" class="h-full rounded-full animate-shimmer" style="width: 20%; background-color: #0EA5E9;"></div>
     </div>
    </div>
    <p class="text-center text-xs mt-4" style="color: #94A3B8;">Master Tee • MTHYDRA V.9</p>
   </footer>
  </div>

  <script>
    // --- [ตั้งค่าที่นี่] ---
    const LIFF_ID = '2009416313-zU1qVT8p'; // <--- ใส่ LIFF ID ของคุณ
    const GAS_URL = 'https://liff.line.me/2009416313-zU1qVT8p'; // <--- ใส่ URL ของ GAS (Deploy as Web App)
    
    let userProfile = null;

    // 1. เริ่มต้นระบบ LIFF
    async function main() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          getUserProfile();
        } else {
          liff.login();
        }
      } catch (err) {
        console.error('LIFF Error:', err);
        document.getElementById('status-text').textContent = 'LIFF Init Failed';
      }
    }

    // 2. ดึงข้อมูล Profile มาแสดงผล
    async function getUserProfile() {
      try {
        const profile = await liff.getProfile();
        userProfile = profile;
        
        // อัปเดตชื่อและรูป
        document.getElementById('user-name').textContent = profile.displayName;
        document.getElementById('user-id-display').textContent = 'ID: ' + profile.userId;
        
        if (profile.pictureUrl) {
          const img = document.getElementById('user-picture');
          img.src = profile.pictureUrl;
          img.classList.remove('hidden');
          document.getElementById('user-icon-placeholder').classList.add('hidden');
        }

        // อัปเดตสถานะ UI
        document.getElementById('status-text').textContent = 'เชื่อมต่อ LINE สำเร็จ';
        document.getElementById('status-dot').style.backgroundColor = '#06C755';
        document.getElementById('online-indicator').style.backgroundColor = '#06C755';
        document.getElementById('progress-bar').style.width = '100%';
        document.getElementById('stat-1').textContent = 'Ready';
        
      } catch (err) {
        console.error('Profile Error:', err);
      }
    }

    // 3. ฟังก์ชันส่งข้อมูลไปที่ GAS (ทำงานร่วมกับ doPost เดิมของคุณ)
    let isLoading = false;
    async function handleCTA() {
      if (isLoading || !userProfile) return;
      
      isLoading = true;
      const button = document.getElementById('cta-button');
      const buttonText = document.getElementById('button-text');
      const statusText = document.getElementById('status-text');
      const statusDot = document.getElementById('status-dot');
      
      // เปลี่ยน UI เป็นสถานะกำลังโหลด
      buttonText.textContent = 'กำลังส่งข้อมูล...';
      button.style.opacity = '0.7';
      statusText.textContent = 'Connecting to GAS...';
      statusDot.style.backgroundColor = '#F59E0B';

      try {
        // [หัวใจสำคัญ] ส่งข้อมูลในรูปแบบที่ GAS PISD6_APP Facade ของคุณต้องการ
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors', // สำคัญสำหรับ GAS Web App
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'liff_auth', // เงื่อนไขที่คุณตั้งไว้ใน doPost
            userId: userProfile.userId,
            displayName: userProfile.displayName,
            pictureUrl: userProfile.pictureUrl,
            timestamp: new Date().getTime()
          })
        });

        // เมื่อส่งสำเร็จ (แม้จะเป็น no-cors เราจะถือว่าส่งออกไปแล้ว)
        buttonText.textContent = 'ลงทะเบียนสำเร็จ!';
        button.style.background = 'linear-gradient(135deg, #06C755 0%, #22C55E 100%)';
        statusText.textContent = 'ข้อมูลถูกส่งไปยังระบบเรียบร้อย';
        statusDot.style.backgroundColor = '#06C755';
        
        // หลังจาก 3 วินาที ให้รีเซ็ตปุ่ม (หรือจะปิดหน้าต่าง LIFF เลยก็ได้)
        setTimeout(() => {
          liff.closeWindow(); // ปิดหน้าต่าง LIFF อัตโนมัติ
        }, 2000);

      } catch (err) {
        console.error('GAS Error:', err);
        buttonText.textContent = 'เกิดข้อผิดพลาด';
        isLoading = false;
        button.style.opacity = '1';
      }
    }

    // รัน Main เมื่อโหลดหน้าเว็บ
    main();
  </script>
 </body>
</html>
